<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Personal Financial Planning System" />
    <title>Personal Financial Planning</title>
    <script>
      // Apply persisted theme synchronously to avoid the dark-mode flash on load.
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var prefers = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = stored || (prefers ? "dark" : "light");
          if (theme === "dark") document.documentElement.classList.add("dark");
        } catch (_) {}
      })();
    </script>
  </head>
  <body class="h-full bg-background text-foreground antialiased">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
