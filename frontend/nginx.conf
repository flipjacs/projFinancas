server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every unknown path is rewritten to index.html so
    # React Router can take over client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to the backend so the bundle can use same-origin URLs
    # (no CORS preflight, no token leakage to a different host).
    location /api/v1/ {
        proxy_pass http://backend:8000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://backend:8000/health;
    }

    # Cache static assets aggressively; index.html stays uncached so deploys
    # are picked up immediately.
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
