server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version in error pages / Server header.
    server_tokens off;

    # Sensible request body limit — uploads aren't a thing here.
    client_max_body_size 2m;

    # ---- Compression --------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/wasm
        application/font-woff2
        font/woff2
        image/svg+xml
        text/css
        text/plain
        text/xml;

    # ---- Security headers ---------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ---- SPA fallback -------------------------------------------------------
    # Every unknown path is rewritten to index.html so React Router can take
    # over client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached — otherwise a deploy is only visible
    # after the browser TTL elapses. Hashed assets handle long caching below.
    # nginx resets inherited add_header when a location adds its own, so the
    # security headers must be repeated here.
    location = /index.html {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files /index.html =404;
    }

    # ---- Reverse proxy to FastAPI ------------------------------------------
    # Same-origin /api/v1 → backend service over the Compose network.
    # No CORS preflight, no token leakage to a different host.
    location /api/v1/ {
        proxy_pass http://backend:8000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location /health {
        proxy_pass http://backend:8000/health;
        access_log off;
    }

    # ---- Hashed static assets -----------------------------------------------
    # Vite emits filename hashes for /assets/*, so the URL itself changes on
    # deploy. Cache aggressively (one year, immutable).
    location ~* ^/assets/.*\.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
        access_log off;
    }

    # Fallback for any other static asset outside /assets (favicons, etc).
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }
}
